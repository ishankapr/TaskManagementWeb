<div class="addUserForm" @fadeIn>
  <div class="container">
    <div class="box_header">
      <span>Add New User</span>
      <p-button icon="pi pi-times" variant="text" severity="secondary" (onClick)="close()" />
    </div>
    <div class="box_body">
      <form [formGroup]="userForm" (ngSubmit)="addUser()">
        <div class="form__item">
          <label for="username">Username</label>
          <input pInputText id="username" formControlName="username" placeholder="Enter username" class="w-full" />
          <small class="error" *ngIf="userForm.get('username')?.touched && userForm.get('username')?.invalid">Username is required</small>
        </div>

        <div class="form__item">
          <label for="password">Password</label>
          <p-password id="password" formControlName="password" placeholder="Enter password" [feedback]="false" [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" />
          <small class="error" *ngIf="userForm.get('password')?.touched && userForm.get('password')?.invalid">Password is required</small>
        </div>

        <div class="form__item">
          <label for="role">Role</label>
          <p-select id="role" formControlName="role" [options]="userRoles" placeholder="Select role" styleClass="w-full" />
        </div>

        <p-button type="submit" label="Add User" icon="pi pi-user-plus" [disabled]="userForm.invalid" styleClass="w-full" />
      </form>
    </div>
  </div>
</div>
