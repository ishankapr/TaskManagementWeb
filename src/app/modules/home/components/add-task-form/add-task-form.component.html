<div class="modal-overlay" @fadeIn (click)="close()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-card__header">
      <div class="modal-card__header-icon">
        <i class="pi pi-plus"></i>
      </div>
      <div>
        <h3>New Task</h3>
        <p>Fill in the details to create a task</p>
      </div>
      <p-button icon="pi pi-times" variant="text" severity="secondary" (onClick)="close()" styleClass="close-btn" />
    </div>

    <form [formGroup]="taskForm" (ngSubmit)="addTask()" class="modal-card__form">

      <div class="form-field">
        <label for="title">Title <span class="required">*</span></label>
        <input pInputText id="title" formControlName="title" placeholder="e.g. Fix login bug" />
        <small class="error" *ngIf="taskForm.get('title')?.touched && taskForm.get('title')?.invalid">Title is required</small>
      </div>

      <div class="form-field">
        <label for="description">Description <span class="required">*</span></label>
        <textarea pTextarea id="description" formControlName="description" placeholder="Describe the task..." rows="3" autoResize="true"></textarea>
        <small class="error" *ngIf="taskForm.get('description')?.touched && taskForm.get('description')?.invalid">Description is required</small>
      </div>

      <!-- <div class="form-row">
        <div class="form-field">
          <label for="status">Status</label>
          <p-select id="status" formControlName="status" [options]="taskStatuses" placeholder="Select status" styleClass="w-full" />
        </div>
        <div class="form-field">
          <label for="assignedTo">Assign To <span class="required">*</span></label>
          <p-select id="assignedTo" formControlName="assignedTo"
            [options]="(users$ | async) ?? []" optionLabel="username" optionValue="id"
            placeholder="Select user" styleClass="w-full" />
        </div>
      </div> -->

      <div class="modal-card__footer">
        <p-button label="Cancel" severity="secondary" variant="outlined" (onClick)="close()" />
        <p-button type="submit" label="Create Task" icon="pi pi-check" [disabled]="taskForm.invalid" />
      </div>
    </form>

  </div>
</div>
