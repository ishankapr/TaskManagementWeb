<p-drawer [(visible)]="visible" position="right" styleClass="edit-drawer" [showCloseIcon]="false" (onHide)="close()">
  <ng-template pTemplate="header">
    <div class="drawer-header">
      <div class="drawer-header__info">
        <i class="pi pi-pencil"></i>
        <div>
          <h3>Edit Task</h3>
          <p>{{ task.title }}</p>
        </div>
      </div>
      <p-button icon="pi pi-times" variant="text" severity="secondary" (onClick)="close()" />
    </div>
  </ng-template>

  <form [formGroup]="taskForm" (ngSubmit)="saveTask()" class="drawer-form">
    <div class="form-field">
      <label for="title">Title</label>
      <input pInputText id="title" formControlName="title" placeholder="Task title" />
      <small class="error" *ngIf="taskForm.get('title')?.touched && taskForm.get('title')?.invalid">Title is required</small>
    </div>

    <div class="form-field">
      <label for="description">Description</label>
      <textarea pTextarea id="description" formControlName="description" placeholder="Task description" rows="4" autoResize="true"></textarea>
      <small class="error" *ngIf="taskForm.get('description')?.touched && taskForm.get('description')?.invalid">Description is required</small>
    </div>

    <div class="form-field">
      <label for="status">Status</label>
      <p-select id="status" formControlName="status" [options]="taskStatuses" placeholder="Select status" styleClass="w-full" />
    </div>

    <div class="form-field">
      <label for="assignedTo">Assigned To</label>
      <p-select id="assignedTo" formControlName="assignedTo"
        [options]="(users$ | async) ?? []" optionLabel="username" optionValue="id"
        placeholder="Select user" styleClass="w-full" />
    </div>

    <div class="drawer-footer">
      <p-button label="Cancel" severity="secondary" variant="outlined" (onClick)="close()" />
      <p-button type="submit" label="Save Changes" icon="pi pi-check" [disabled]="taskForm.invalid" />
    </div>
  </form>
</p-drawer>
